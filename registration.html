<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link rel="stylesheet" href="fontawesome/css/fontawesome.min.css">
    <link rel="stylesheet" href="css/registration.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="registration-container">
                <div class="reg-left">
                    <div class="reg-h1">
                    <h1>welcome to my website</h1>
                </div>
                <div class="reg-p">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Expedita deserunt unde vero quasi iusto? Voluptatum, nihil. Facilis porro fugiat corrupti!
                    </p>
                </div>
                <div class="btn">
                    <button>click me! </button>
                </div>
            </div>
            <div class="reg-right">
                <div class="form-h2">
                    <h2>registration</h2>

                </div>
                <div class="reg-form">
                    <form action="#" method="get">
                        <div class="name">
                            <input type="text" name="" id="" placeholder="enter your first name">
                            <input type="text" name="" id="" placeholder="enter your last name" >
                        </div>
                        <div class="email">
                            <input type="email" name="" id="" placeholder="enter your email">
                        </div>
                        <div class="passard">
                            <input type="password"
                            name="" id="" placeholder="enter your passard">
                        </div>
                        <div class="phone-no">
                            <input type="number" name="" id="" placeholder="enter your phone number ">
                        </div>
                        <div class="gender">
                            <h1>gender</h1>
                            <div class="male">
                                    <input type="radio" name="male" id="male">
                                <label for="male">male</label>
                            </div>
                        <div class="female">
                             <input type="radio" name="female" id="female">
                             <label for="female">female</label>
                        </div>
                           
                           
                        </div>
                        <div class="zip-code">
                            <input type="number" name="" id="" placeholder="enter your zip code" >
                        </div>
                        <div class="ward-no">
                            <input type="number" name="" id=""placeholder="enter your word no"  >
                        </div>
                        <div class="btn">
                        <input type="submit" value="registration">
                        <input type="reset" value="reset">
                        </div>
                         <div class="list-icon">
                            <ul>
                                <li><a href="" target="_blank" rel="noopener noreferrer"><i class="fab fa-google fa-xs fa-fw"></i></a></li>
                                <li><a href="" target="_blank" rel="noopener noreferrer"><i class="fab fa-google fa-xs fa-fw"></i></a></li>
                                <li><a href="" target="_blank" rel="noopener noreferrer"><i class="fab fa-google fa-xs fa-fw"></i></a></li>
                            </ul>
                        </div>
                    </form>
                </div>
            </div>
            

        </div>
    </div>
</body>
</html>
